version: '3'

vars:
  BUNDLE_NAME: bear-notes-mcpb-{{now | date "20060102"}}.mcpb
  
tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
  
  inspector:
    desc: Run MCP inspector with Web UI
    cmds:
      - pnpm exec mcp-inspector node dist/main.js
      
  setup:
    desc: Project setup (install + build)
    cmds:
      - pnpm install
      - pnpm run build 

  style:
    desc: Runs linter and formatter with fixes
    cmds:
      - pnpm run lint
      - pnpm run format
  
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist tmp *.mcpb
      
  build:
    desc: Build with quality checks
    deps: [clean]
    cmds:
      - pnpm run check
      - pnpm run test
      - pnpm run build
      
  test:system:
    desc: Run system tests with MCP Inspector CLI
    # Skip in CI / container — system tests need Bear.app on macOS
    status:
      - test "$CI" = "true"
    cmds:
      - pnpm run test:system


  # === Bundle Build ===

  pack:
    desc: Create production bundle
    # deps: [build, test:system]
    cmds:
      - task: build      
      - task: test:system # In CI, when skipped, this will be considered as success run
      - rm -rf tmp/bundle && mkdir -p tmp/bundle
      - cp -r dist/*.js manifest.json assets/* package.json tmp/bundle/
      - pnpm exec mcpb validate tmp/bundle/manifest.json
      - echo 'node-linker=hoisted' > tmp/bundle/.npmrc
      - cd tmp/bundle && pnpm install --prod
      - pnpm exec mcpb pack tmp/bundle {{.BUNDLE_NAME}}
      - echo "Bundle created {{.BUNDLE_NAME}}"   
    
  info:
    desc: Show bundle info
    cmds:
      - pnpm exec mcpb info {{.BUNDLE_NAME}}
  
  version:
    desc: Update version across all files
    interactive: true
    requires:
      vars: 
        - VERSION
    prompt: "Confirm version update to {{.VERSION}}?"
    preconditions:
      - sh: echo "{{.VERSION}}" | grep -E '^[0-9]{2}\.[0-9]{2}\.[0-9]{2}$'
        msg: "VERSION must follow CalVer format (YY.MM.DD)"
    cmds:
      - |
        echo "Updating version to {{.VERSION}}"
        
        sed -i '' 's/"version": "[^"]*"/"version": "{{.VERSION}}"/' package.json
        
        sed -i '' 's/"version": "[^"]*"/"version": "{{.VERSION}}"/' manifest.json
        
        sed -i '' "s/export const APP_VERSION = '[^']*'/export const APP_VERSION = '{{.VERSION}}'/" src/config.ts
        
        echo "Version updated to {{.VERSION}} in package.json, manifest.json, and src/config.ts"
      - pnpm install --lockfile-only

  push-release:
    desc: Commit, tag, and push a release
    requires:
      vars:
        - VERSION
        - SHORT_DESCRIPTION
    preconditions:
      - sh: test "$(git branch --show-current)" = "main"
        msg: Must be on main branch
      - sh: test -z "$(git status --porcelain)"
        msg: Working tree must be clean
    prompt: "Release v{{.VERSION}} ({{.SHORT_DESCRIPTION}})?"
    cmds:
      - |
        git commit --allow-empty -m "release: {{.VERSION}} - {{.SHORT_DESCRIPTION}}"
        git tag -a "v{{.VERSION}}" -m "release: {{.VERSION}}"
        git push --follow-tags
  
